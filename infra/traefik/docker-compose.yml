# Traefik standalone stack
# Path on VPS: /srv/traefik/docker-compose.yml
# Bring up:    cd /srv/traefik && docker compose up -d

services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt:/letsencrypt

    # ----- Container hardening -----
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # bind 80/443
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 200
        reservations:
          cpus: "0.05"
          memory: 64M
    ulimits:
      nofile:
        soft: 16384
        hard: 16384

    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Dashboard is OFF by default. To enable, define the router below
      # AND