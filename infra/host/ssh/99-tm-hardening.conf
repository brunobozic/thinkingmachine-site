# SSH hardening drop-in for tm-prod-fsn1. Installed at:
#   /etc/ssh/sshd_config.d/99-tm-hardening.conf
# Then `sshd -t && systemctl reload ssh`.

X11Forwarding no
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2
PermitTunnel no
AllowAgentForwarding no
AllowTcpForwarding local
GatewayPorts no
PrintLastLog yes
