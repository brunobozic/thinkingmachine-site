user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — send to stdout/stderr so Docker captures it
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /dev/stdout main;
    error_log   /dev/stderr warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # Gzip
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    server {
        listen       80;
        server_name  _;
        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers (Traefik may add more at the edge)
        add_header X-Frame-Options           "SAMEORIGIN"          always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # Cache hashed static assets aggressively
        location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML — short cache, must-revalidate
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Astro static routing (directory format → /path/index.html)
        location / {
            try_files $uri $uri/ $uri.html $uri/index.html =404;
        }

        # Custom 404
        error_page 404 /404/index.html;
    }
}
